<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory lookup | HeavyParts Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar"></div>

        <!-- Main Workspace -->
        <div class="main-workspace">
            <div class="top-bar">
                <div class="top-bar-title">Restricted Inventory Directory</div>
                <div class="top-bar-actions">
                    <span class="page-description">Quick search tool for cashier shelf lookup.</span>
                </div>
            </div>

            <div class="content-body">
                <!-- Filters -->
                <div class="card" style="margin-bottom: 24px;">
                    <div class="table-filters" style="display: flex; gap: 16px; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 250px;">
                            <input type="text" id="searchBar" class="form-control" placeholder="Search by name, part no, or warehouse location..." oninput="renderCashierInventory()">
                        </div>
                        <div style="width: 200px;">
                            <select id="categoryFilter" class="form-control" onchange="renderCashierInventory()">
                                <option value="All">All Categories</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Inventory Directory Table -->
                <div class="card table-card">
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Part Number</th>
                                    <th>English Description</th>
                                    <th>Chinese Description</th>
                                    <th>Category</th>
                                    <th>Warehouse Location</th>
                                    <th>Stock Level</th>
                                    <th>Regular Price</th>
                                    <th>VIP Price</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryTableBody">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Initiate active sidebar link under Cashier roles
        initSidebar('cashier-inventory');

        // Populate Category Dropdowns & Filter options
        function loadCategories() {
            const categories = db.getCategories();
            const filterDropdown = document.getElementById('categoryFilter');

            filterDropdown.innerHTML = '<option value="All">All Categories</option>';
            categories.forEach(cat => {
                filterDropdown.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        }

        // Render inventory table
        function renderCashierInventory() {
            const products = db.getProducts();
            const searchVal = document.getElementById('searchBar').value.toLowerCase();
            const categoryVal = document.getElementById('categoryFilter').value;
            const tbody = document.getElementById('inventoryTableBody');

            tbody.innerHTML = '';

            const filtered = products.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(searchVal) || 
                                      p.chineseName.toLowerCase().includes(searchVal) || 
                                      p.partNo.toLowerCase().includes(searchVal) ||
                                      p.address.toLowerCase().includes(searchVal);

                const matchesCategory = categoryVal === 'All' || p.category === categoryVal;
                return matchesSearch && matchesCategory;
            });

            filtered.forEach(p => {
                const tr = document.createElement('tr');
                const stockInfo = getStockStatus(p.stock);

                tr.innerHTML = `
                    <td class="font-bold">${p.partNo}</td>
                    <td>${p.name}</td>
                    <td>${p.chineseName}</td>
                    <td>${p.category}</td>
                    <td><code>${p.address}</code></td>
                    <td>
                        <span class="badge ${stockInfo.class}">${p.stock} units</span>
                    </td>
                    <td class="font-bold">₱${p.price1.toLocaleString()}</td>
                    <td class="font-bold" style="color: var(--primary);">₱${p.price2.toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        loadCategories();
        renderCashierInventory();
    </script>
</body>
</html>
