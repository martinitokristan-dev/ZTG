<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Log | ZTG Heavy Parts</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <style>
        .search-container {
            position: relative;
            width: 300px;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        .search-input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }
        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar"></div>

        <!-- Main Workspace -->
        <div class="main-workspace">
            <div class="top-bar">
                <div class="top-bar-title">Customer Log</div>
                <div class="top-bar-actions">
                    <span class="page-description">View customer purchase history, contact details, and initial registration date.</span>
                </div>
            </div>

            <div class="content-body">
                <div class="card table-card">
                    <div class="table-header-bar" style="display: flex; justify-content: space-between; align-items: center; padding: 16px 24px;">
                        <h3 style="font-size: 16px; font-weight: 700;">Customer Directory</h3>
                        
                        <div class="search-container">
                            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                            <input type="text" id="searchInput" class="search-input" placeholder="Search by name or number..." oninput="renderCustomerLog()">
                        </div>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead style="border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text-secondary); text-transform: uppercase;">
                                <tr>
                                    <th style="padding: 12px 24px; font-weight: 700;">Full Name</th>
                                    <th style="padding: 12px 24px; font-weight: 700;">Contact Number</th>
                                    <th style="padding: 12px 24px; font-weight: 700; text-align: center;">Total Purchases</th>
                                    <th style="padding: 12px 24px; font-weight: 700;">First Purchase Date</th>
                                    <th style="padding: 12px 24px; font-weight: 700;">Last Purchase Date</th>
                                </tr>
                            </thead>
                            <tbody id="customerTableBody">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        initSidebar('customer-log');

        function renderCustomerLog() {
            const tbody = document.getElementById('customerTableBody');
            const searchInput = document.getElementById('searchInput').value.toLowerCase();
            
            const transactions = db.getTransactions();
            const customersData = {};

            // Aggregate data from transactions
            transactions.forEach(tx => {
                if (!tx.customer || tx.customer === 'Guest') return;
                
                // We'll parse the date. Assuming format "MM/DD/YYYY, HH:MM:SS AM/PM" or similar Date string
                const txDate = new Date(tx.date);

                if (!customersData[tx.customer]) {
                    customersData[tx.customer] = {
                        name: tx.customer,
                        phone: tx.phone || '',
                        buyCount: 1,
                        firstPurchaseDate: txDate,
                        lastPurchaseDate: txDate,
                        firstPurchaseStr: tx.date,
                        lastPurchaseStr: tx.date
                    };
                } else {
                    customersData[tx.customer].buyCount += 1;
                    
                    // Update phone if previously missing
                    if (!customersData[tx.customer].phone && tx.phone) {
                        customersData[tx.customer].phone = tx.phone;
                    }

                    // Track earliest purchase
                    if (txDate < customersData[tx.customer].firstPurchaseDate) {
                        customersData[tx.customer].firstPurchaseDate = txDate;
                        customersData[tx.customer].firstPurchaseStr = tx.date;
                    }

                    // Track latest purchase
                    if (txDate > customersData[tx.customer].lastPurchaseDate) {
                        customersData[tx.customer].lastPurchaseDate = txDate;
                        customersData[tx.customer].lastPurchaseStr = tx.date;
                    }
                }
            });

            // Convert object to array and filter
            let customerList = Object.values(customersData).filter(c => {
                return c.name.toLowerCase().includes(searchInput) || c.phone.includes(searchInput);
            });

            // Sort alphabetically by name
            customerList.sort((a, b) => a.name.localeCompare(b.name));

            tbody.innerHTML = '';

            if (customerList.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-secondary); padding: 30px;">No customers found.</td></tr>';
                return;
            }

            customerList.forEach(c => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = "1px solid var(--border)";
                tr.innerHTML = `
                    <td style="padding: 16px 24px; font-weight: 600; color: var(--text-primary); font-size: 14px;">${c.name}</td>
                    <td style="padding: 16px 24px; color: var(--text-secondary); font-size: 13px;">${c.phone || '<span style="font-style: italic; opacity: 0.6;">Not provided</span>'}</td>
                    <td style="padding: 16px 24px; text-align: center;">
                        <span style="background: var(--primary); color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;">${c.buyCount} items</span>
                    </td>
                    <td style="padding: 16px 24px; color: var(--text-secondary); font-size: 13px;">${c.firstPurchaseStr}</td>
                    <td style="padding: 16px 24px; color: var(--text-secondary); font-size: 13px;">${c.lastPurchaseStr}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Setup real-time listener for customer updates via transactions
        window.addEventListener('storage', function(e) {
            if (e.key === 'ztg_transactions') {
                renderCustomerLog();
            }
        });

        // Initial render
        renderCustomerLog();
    </script>
</body>
</html>
