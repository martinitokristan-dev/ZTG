<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | ZTG Heavy Parts</title>
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body class="login-body">
    <!-- Ambient Background glows -->
    <div class="login-bg-glow-1"></div>
    <div class="login-bg-glow-2"></div>

    <div class="login-card">
        <div class="login-logo">ZTG <span>Heavy Parts</span></div>
        <p class="login-subtitle">Select your role and sign in to continue</p>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="role-selector">
                <div class="role-card active" onclick="selectRole('Admin', this)">
                    <svg class="role-icon" viewBox="0 0 24 24">
                        <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                    </svg>
                    <div class="role-name">Admin</div>
                    <div class="role-desc">Full system access</div>
                </div>
                <div class="role-card" onclick="selectRole('Cashier', this)">
                    <svg class="role-icon" viewBox="0 0 24 24">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                        <line x1="8" y1="21" x2="16" y2="21"></line>
                        <line x1="12" y1="17" x2="12" y2="21"></line>
                    </svg>
                    <div class="role-name">Cashier</div>
                    <div class="role-desc">POS & Sales only</div>
                </div>
            </div>

            <input type="hidden" id="selectedRole" value="Admin">

            <div class="form-group">
                <label class="form-label" for="username">Employee ID or Username</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2M12 11a4 4 0 100-8 4 4 0 000 8z"/></svg>
                    <input type="text" id="username" class="form-control" placeholder="Enter username or ID" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4"/></svg>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>
            </div>

            <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="rememberMe">
                <label class="form-label" for="rememberMe" style="margin-bottom: 0; cursor: pointer; user-select: none;">Remember me on this device</label>
            </div>

            <button type="submit" class="btn login-btn" style="width: 100%; margin-top: 14px;">
                Sign In
                <svg style="width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5;" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </button>
        </form>
    </div>

    <!-- Include shared app database & router framework -->
    <script src="app.js"></script>
    <script>
        // Set selected role on click
        function selectRole(role, element) {
            document.getElementById('selectedRole').value = role;
            document.querySelectorAll('.role-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
            
            // Prefill mock usernames for easier testing
            const userField = document.getElementById('username');
            if (role === 'Admin') {
                userField.value = 'admin';
            } else {
                userField.value = 'EMP-001';
            }
        }

        // Initialize with default admin values
        selectRole('Admin', document.querySelector('.role-card'));

        function handleLogin(event) {
            event.preventDefault();
            const role = document.getElementById('selectedRole').value;
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const employees = db.getEmployees() || [];

            let found = null;
            if (role === 'Admin') {
                found = employees.find(e =>
                    e.role === 'Admin' && e.status !== 'Inactive' && (
                        (e.username && e.username.toLowerCase() === username.toLowerCase()) ||
                        e.id.toLowerCase() === username.toLowerCase() ||
                        username.toLowerCase() === 'admin'
                    )
                );
                if (!found) found = employees.find(e => e.role === 'Admin' && e.status !== 'Inactive');
            } else {
                found = employees.find(e =>
                    (e.role === 'Cashier' || e.role === 'Checker' || e.role === 'Supervisor') && e.status !== 'Inactive' && (
                        e.id.toLowerCase() === username.toLowerCase() ||
                        (e.username && e.username.toLowerCase() === username.toLowerCase()) ||
                        e.name.toLowerCase().includes(username.toLowerCase())
                    )
                );
            }

            if (!found) {
                alert('Account not found. Check your Employee ID or username.');
                return;
            }

            const expectedPwd = found.password || found.pin || '';
            if (expectedPwd && password !== expectedPwd) {
                alert('Incorrect password. Please try again.');
                return;
            }

            updateCurrentUserSession(found);

            if (role === 'Admin') {
                navigateTo('dashboard.html');
            } else {
                navigateTo('pos.html');
            }
        }
    </script>
</body>
</html>
