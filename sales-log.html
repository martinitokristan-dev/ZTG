<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Log | ZTG Heavy Parts</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <style>
        .status-tab {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: #FFFFFF;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .status-tab:hover {
            background: #F8FAFC;
        }
        .status-tab.active {
            background: var(--primary);
            color: #FFFFFF;
            border-color: var(--primary);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.completed { color: var(--success); }
        .status-badge.refund { color: var(--danger); }
        .status-badge.pending { color: var(--warning); }
        .payment-label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .action-btn {
            padding: 4px 12px;
            background: #F1F5F9;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .action-btn:hover {
            background: #E2E8F0;
        }
        .action-btn.update-btn {
            background: #F8FAFC;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <div class="sidebar"></div>

        <!-- Main Workspace -->
        <div class="main-workspace">
            <div class="top-bar">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <div>
                        <h1 style="font-size: 20px; margin-bottom: 2px;">Sales Log</h1>
                        <div class="page-description" style="margin-top: 0; font-size: 12px;">Track all sales transactions with detailed filtering and analytics.</div>
                    </div>
                </div>
            </div>

            <div class="content-body">
                <!-- Stat Cards Row -->
                <div class="grid-4" style="margin-bottom: 16px;">
                    <div class="card stat-box">
                        <div>
                            <span class="stat-label">Total Transactions</span>
                            <div class="stat-value" id="statTotalTrans">0</div>
                        </div>
                    </div>
                    <div class="card stat-box">
                        <div>
                            <span class="stat-label">Total Sales</span>
                            <div class="stat-value" id="statTotalSales">₱0</div>
                        </div>
                    </div>
                    <div class="card stat-box">
                        <div>
                            <span class="stat-label">Refunds</span>
                            <div class="stat-value" id="statRefunds" style="color: var(--danger);">₱0</div>
                        </div>
                    </div>
                    <div class="card stat-box">
                        <div>
                            <span class="stat-label">Average Sale</span>
                            <div class="stat-value" id="statAvgSale">₱0</div>
                        </div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="card" style="margin-bottom: 16px;">
                    <div class="table-filters" style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <div style="flex: 1; min-width: 250px; position: relative;">
                            <svg style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; color: var(--text-muted);" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                            </svg>
                            <input type="text" id="salesSearch" class="form-control form-control-sm" placeholder="Search by receipt #, customer, or cashier..." style="padding-left: 44px;" oninput="renderSalesTable()">
                        </div>
                        <div style="width: 150px;">
                            <select id="timeFilter" class="form-control form-control-sm" onchange="renderSalesTable()">
                                <option value="Today" selected>Today</option>
                                <option value="All">All Time</option>
                                <option value="This Week">This Week</option>
                                <option value="This Month">This Month</option>
                            </select>
                        </div>
                        <div style="width: 150px;">
                            <select id="cashierFilter" class="form-control form-control-sm" onchange="renderSalesTable()">
                                <option value="All">All Cashiers</option>
                            </select>
                        </div>
                        <div style="width: 150px;">
                            <select id="paymentFilter" class="form-control form-control-sm" onchange="renderSalesTable()">
                                <option value="All">All Payments</option>
                                <option value="Cash">Cash</option>
                                <option value="GCash">GCash</option>
                                <option value="Bank">Bank Transfer</option>
                                <option value="Credit Card">Credit Card</option>
                                <option value="P.O. (Pending)">P.O. (Pending)</option>
                            </select>
                        </div>
                        <div style="width: 150px;">
                            <select id="sortFilter" class="form-control form-control-sm" onchange="renderSalesTable()">
                                <option value="Transaction #">Transaction #</option>
                                <option value="Date (Newest)">Date (Newest)</option>
                                <option value="Date (Oldest)">Date (Oldest)</option>
                            </select>
                        </div>
                    </div>
                    
                    <!-- Tabs -->
                    <div style="display: flex; gap: 8px; margin-top: 16px;">
                        <button class="status-tab active" data-status="All" onclick="setTab('All')">All</button>
                        <button class="status-tab" data-status="Completed" onclick="setTab('Completed')">Completed</button>
                        <button class="status-tab" data-status="Refund" onclick="setTab('Refund')">Refund</button>
                        <button class="status-tab" data-status="Pending" onclick="setTab('Pending')">Pending</button>
                    </div>
                </div>

                <!-- Sales Table -->
                <div class="card table-card">
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; text-align: left;">
                            <thead style="border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text-secondary); text-transform: uppercase;">
                            <tr>
                                    <th style="padding: 12px 16px; font-weight: 700;">DATE</th>
                                    <th style="padding: 12px 16px; font-weight: 700;">S.I./C.I./D.R.</th>
                                    <th style="padding: 12px 16px; font-weight: 700;">PART NO.</th>
                                    <th style="padding: 12px 16px; font-weight: 700;">PRODUCT</th>
                                    <th style="padding: 12px 16px; font-weight: 700;">QTY</th>
                                    <th style="padding: 12px 16px; font-weight: 700;">AMOUNT</th>
                                    <th style="padding: 12px 16px; font-weight: 700;">CUSTOMER</th>
                                    <th style="padding: 12px 16px; font-weight: 700;">PAYMENT</th>
                                    <th style="padding: 12px 16px; font-weight: 700;">SERVED BY</th>
                                    <th style="padding: 12px 16px; font-weight: 700;">STATUS</th>
                                </tr>
                            </thead>
                            <tbody id="salesTableBody" style="font-size: 13px;">
                                <!-- Populated dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        initSidebar('sales-log');

        let currentTab = 'All';

        function setTab(status) {
            currentTab = status;
            document.querySelectorAll('.status-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.status === status) {
                    tab.classList.add('active');
                }
            });
            renderSalesTable();
        }

        function loadCashiers() {
            const employees = db.getEmployees();
            const filterDropdown = document.getElementById('cashierFilter');
            filterDropdown.innerHTML = '<option value="All">All Cashiers</option>';
            
            employees.filter(e => e.role === 'Cashier' || e.role === 'Manager' || e.role === 'Admin').forEach(e => {
                filterDropdown.innerHTML += `<option value="${e.name}">${e.name.split(' ')[0]}</option>`;
            });
        }

        function getStatusHtml(status) {
            let className = 'pending';
            let iconSvg = `<svg viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" fill="none" stroke-width="2.5" style="flex-shrink: 0; display: inline-block; vertical-align: middle;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
            if (status === 'Completed' || status === 'Paid' || status === 'P.O. Approved') {
                className = 'completed';
                iconSvg = `<svg viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" fill="none" stroke-width="2.5" style="flex-shrink: 0; display: inline-block; vertical-align: middle;"><polyline points="20 6 9 17 4 12"/></svg>`;
                status = 'Completed';
            } else if (status === 'Refund' || status === 'Return') {
                className = 'refund';
                iconSvg = `<svg viewBox="0 0 24 24" width="13" height="13" stroke="currentColor" fill="none" stroke-width="2.5" style="flex-shrink: 0; display: inline-block; vertical-align: middle;"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
                status = 'Refund';
            }
            return `<span class="status-badge ${className}">${iconSvg} ${status}</span>`;
        }

        // Parse date string to a Date object for comparison
        function parseTxDate(dateStr) {
            if (!dateStr) return null;
            // Handle ISO format
            if (dateStr.includes('T') || dateStr.match(/^\d{4}-/)) {
                return new Date(dateStr);
            }
            // Handle "Jun 21, 2026, 3:14 PM" format
            try {
                return new Date(Date.parse(dateStr));
            } catch (e) {
                return null;
            }
        }

        function matchesTimeFilter(t, filterVal) {
            if (filterVal === 'All') return true;
            const txDate = parseTxDate(t.date);
            if (!txDate || isNaN(txDate)) return true; // Can't parse, show it

            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

            if (filterVal === 'Today') {
                const txDay = new Date(txDate.getFullYear(), txDate.getMonth(), txDate.getDate());
                return txDay.getTime() === today.getTime();
            }
            if (filterVal === 'This Week') {
                const dayOfWeek = today.getDay(); // 0=Sun
                const weekStart = new Date(today);
                weekStart.setDate(today.getDate() - dayOfWeek);
                return txDate >= weekStart;
            }
            if (filterVal === 'This Month') {
                return txDate.getFullYear() === now.getFullYear() && txDate.getMonth() === now.getMonth();
            }
            return true;
        }

        // Sales Log: only revenue-impacting transactions
        function isSalesTransaction(t) {
            // Explicitly tagged
            if (t.type === 'sale') return true;
            if (t.type && t.type !== 'sale') return false;
            // Status-based fallback for legacy records
            const s = (t.status || '').toLowerCase();
            return s === 'completed' || s === 'paid' || s === 'p.o. approved' || s === 'refund' || s === 'return';
        }

        function renderSalesTable() {
            const transactions = db.getTransactions();
            const products = db.getProducts();
            const searchVal = document.getElementById('salesSearch').value.toLowerCase();
            const cashierVal = document.getElementById('cashierFilter').value;
            const paymentVal = document.getElementById('paymentFilter').value;
            const timeVal = document.getElementById('timeFilter').value;
            const tbody = document.getElementById('salesTableBody');

            tbody.innerHTML = '';

            let totalTransCount = 0;
            let totalSales = 0;
            let totalRefunds = 0;

            // Filter to sales-only (revenue-impacting) records first
            const salesOnly = transactions.filter(t => isSalesTransaction(t));

            // Filter logic
            const filteredTransactions = salesOnly.filter(t => {
                const matchesSearch = (t.siNo || '').toLowerCase().includes(searchVal) || 
                                      (t.customer || '').toLowerCase().includes(searchVal) || 
                                      (t.cashier || '').toLowerCase().includes(searchVal);
                
                const matchesCashier = cashierVal === 'All' || (t.cashier || '').includes(cashierVal);
                const matchesPayment = paymentVal === 'All' || (t.payment || '').includes(paymentVal);
                const matchesTime = matchesTimeFilter(t, timeVal);

                let isTabMatch = false;
                const statusGrp = (t.status === 'Completed' || t.status === 'Paid' || t.status === 'P.O. Approved') ? 'Completed' :
                                  (t.status === 'Refund' || t.status === 'Return') ? 'Refund' : 'Pending';

                if (currentTab === 'All') isTabMatch = true;
                else if (currentTab === statusGrp) isTabMatch = true;

                // KPI calculations
                if (matchesSearch && matchesCashier && matchesPayment && matchesTime) {
                    totalTransCount++;
                    if (statusGrp === 'Completed') totalSales += (t.amount || 0);
                    if (statusGrp === 'Refund') totalRefunds += (t.amount || 0);
                }

                return matchesSearch && matchesCashier && matchesPayment && matchesTime && isTabMatch;
            });

            const avgSale = totalTransCount > 0 ? totalSales / totalTransCount : 0;
            
            document.getElementById('statTotalTrans').innerText = totalTransCount.toLocaleString();
            document.getElementById('statTotalSales').innerText = `₱${totalSales.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
            document.getElementById('statRefunds').innerText = `₱${totalRefunds.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
            document.getElementById('statAvgSale').innerText = `₱${avgSale.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;

            if (filteredTransactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align: center; color: var(--text-secondary); padding: 20px;">No sales transactions found.</td></tr>';
                return;
            }

            filteredTransactions.forEach(t => {
                let rowItems = [];
                if (t.items && t.items.length > 0) {
                    rowItems = t.items;
                } else {
                    rowItems = [{
                        id: null,
                        name: t.itemName,
                        partNo: 'N/A',
                        qty: t.qty,
                        price: null
                    }];
                }

                rowItems.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.style.borderBottom = '1px solid var(--border)';
                    
                    // Format Date & Time
                    let datePart = t.date;
                    let timePart = '';
                    if (t.date && t.date.includes(',')) {
                        const parts = t.date.split(',');
                        if (parts.length >= 3) {
                            datePart = parts[0] + ',' + parts[1];
                            timePart = parts[2].trim();
                        } else if (parts.length === 2) {
                            datePart = parts[0];
                            timePart = parts[1].trim();
                        }
                    }

                    // Resolve Part Number and Product details
                    let partNo = item.partNo || '';
                    let product = null;

                    if (item.id) {
                        product = products.find(p => p.id === item.id);
                    }
                    
                    if (!partNo || partNo === 'N/A' || partNo === '—') {
                        let baseName = item.name || t.itemName || '';
                        if (baseName.includes(' & ')) {
                            baseName = baseName.split(' & ')[0];
                        }
                        baseName = baseName.replace(' (Order Release)', '').trim();
                        
                        product = products.find(p => p.name === baseName);
                        
                        if (!product && baseName.includes(' (')) {
                            const noVariantName = baseName.split(' (')[0].trim();
                            product = products.find(p => p.name === noVariantName);
                        }
                        
                        if (!product) {
                            const sortedProducts = [...products].sort((a, b) => b.name.length - a.name.length);
                            product = sortedProducts.find(p => baseName.startsWith(p.name));
                        }
                        
                        partNo = (product && product.partNo) ? product.partNo : 'N/A';
                    }

                    if (!product) {
                        product = {};
                    }
                    const chineseName = product.chineseName || '';
                    
                    let resolvedName = item.name || t.itemName || '-';
                    if (item.variant) {
                        if (!resolvedName.includes(`(${item.variant})`)) {
                            resolvedName += ` (${item.variant})`;
                        }
                    }
                    
                    let displayName = `<span style="font-weight: 600; color: var(--text-primary);">${resolvedName}</span>`;
                    if (chineseName) {
                        displayName += `<br><span style="font-size: 12px; color: var(--text-secondary);">${chineseName}</span>`;
                    }

                    // Format payment method
                    let paymentDisplay = t.payment || '-';
                    if (t.payment && t.payment.includes('Deposit')) {
                        paymentDisplay = `<span style="color: var(--text-secondary);">${t.payment}</span>`;
                    }

                    // Amount Color Coding
                    const isDeduction = (t.status === 'Refund' || t.status === 'Return' || t.status === 'Void');
                    const amountColor = isDeduction ? 'var(--danger)' : 'var(--success)';
                    const amountPrefix = isDeduction ? '- ' : '';

                    // Calculate row amount
                    let rowAmount = 0;
                    if (item.price !== null && item.price !== undefined) {
                        rowAmount = item.price * item.qty;
                    } else {
                        rowAmount = t.amount || 0;
                    }

                    tr.innerHTML = `
                        <td style="padding: 16px; font-size: 13px;">
                            <span style="display: block; color: var(--text-primary);">${datePart}</span>
                            ${timePart ? `<span style="display: block; font-size: 11px; color: var(--text-secondary);">${timePart}</span>` : ''}
                        </td>
                        <td style="padding: 16px; font-size: 14px; font-weight: 700; color: var(--text-primary);">${t.siNo || '-'}</td>
                        <td style="padding: 16px; font-size: 13px; color: var(--text-secondary);">${partNo}</td>
                        <td style="padding: 16px;">${displayName}</td>
                        <td style="padding: 16px; font-size: 13px; color: var(--text-secondary);">${item.qty || '-'}</td>
                        <td style="padding: 16px; font-size: 14px; font-weight: 700; color: ${amountColor};">${amountPrefix}₱${(rowAmount).toLocaleString(undefined, {minimumFractionDigits: 0})}</td>
                        <td style="padding: 16px; font-size: 13px; color: var(--text-secondary);">${t.customer || 'Guest'}</td>
                        <td style="padding: 16px; font-size: 13px; color: var(--text-secondary);">${paymentDisplay}</td>
                        <td style="padding: 16px; font-size: 13px; color: var(--text-secondary);">${(t.cashier || '-').split(' ')[0]}</td>
                        <td style="padding: 16px;">${getStatusHtml(t.status)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }

        loadCashiers();
        renderSalesTable();
    </script>
</body>
</html>
